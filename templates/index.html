<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Búsqueda de Pokémon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>

<body>
    {% include "navbar.html" %}

    <div class="search-container">
        <div class="search-card">
            <div class="search-header">
                <img class="poke-ball"
                    src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"
                    alt="Pokebola">
                <h1>Pokédex</h1>
            </div>

            <form id="searchForm" class="search-form">
                <input type="text" id="pokemonInput" placeholder="Nombre del Pokémon" required>
                <button type="submit">🔍 Buscar</button>
            </form>

            <div id="errorMsg" class="error" style="display:none;"></div>
        </div>

        <div id="resultContainer" class="result-container" style="display:none;">
            <div class="pokemon-card">
                <div class="pokemon-header">
                    <h2 id="pokeName"></h2>
                    <span id="pokeType" class="pokemon-type"></span>
                </div>

                <div class="pokemon-image">
                    <img id="pokeImage" src="" alt="">
                </div>

                <div class="pokemon-info">
                    <div class="info-row">
                        <div class="info-item">
                            <span class="info-label">Altura</span>
                            <span id="pokeHeight" class="info-value"></span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Peso</span>
                            <span id="pokeWeight" class="info-value"></span>
                        </div>
                    </div>
                </div>

                <div class="pokemon-section">
                    <h3>Habilidades</h3>
                    <div id="pokeAbilities" class="abilities-grid"></div>
                </div>

                <div class="pokemon-section">
                    <h3>Estadísticas Base</h3>
                    <div id="pokeStats" class="stats-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('searchForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const name = document.getElementById('pokemonInput').value.trim().toLowerCase();
            const errorMsg = document.getElementById('errorMsg');
            const resultContainer = document.getElementById('resultContainer');

            errorMsg.style.display = 'none';
            resultContainer.style.display = 'none';

            if (!name) return;

            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
                if (!res.ok) throw new Error('not found');
                const data = await res.json();

                document.getElementById('pokeName').textContent =
                    data.name.charAt(0).toUpperCase() + data.name.slice(1);
                document.getElementById('pokeType').textContent =
                    data.types.map(t => t.type.name).join(', ');
                const img = document.getElementById('pokeImage');
                img.src = data.sprites.front_default;
                img.alt = data.name;
                document.getElementById('pokeHeight').textContent = (data.height / 10) + ' m';
                document.getElementById('pokeWeight').textContent = (data.weight / 10) + ' kg';

                const abilitiesEl = document.getElementById('pokeAbilities');
                abilitiesEl.innerHTML = data.abilities
                    .map(a => `<span class="ability-badge">${a.ability.name}</span>`)
                    .join('');

                const statsEl = document.getElementById('pokeStats');
                statsEl.innerHTML = data.stats.map(s => {
                    const pct = Math.round((s.base_stat / 255) * 100);
                    const label = s.stat.name.replace(/-/g, ' ')
                        .replace(/\b\w/g, c => c.toUpperCase());
                    return `<div class="stat-bar">
                        <span class="stat-label">${label}</span>
                        <div class="stat-value-bar">
                            <div class="stat-fill" style="width:${pct}%">
                                <span class="stat-value">${s.base_stat}</span>
                            </div>
                        </div>
                    </div>`;
                }).join('');

                resultContainer.style.display = '';
            } catch (err) {
                errorMsg.textContent = `No se encontró información sobre el Pokémon '${name}'.`;
                errorMsg.style.display = '';
            }
        });
    </script>
</body>

</html>
